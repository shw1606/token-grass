name: TokenGrass
options:
  bundleIdPrefix: dev.yulebuilds
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    # Set your team in Xcode (Signing & Capabilities) or via DEVELOPMENT_TEAM here.
    DEVELOPMENT_TEAM: ""
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

packages:
  TokenGrassCore:
    path: TokenGrassCore

targets:
  TokenGrass:
    type: application
    platform: iOS
    sources:
      - path: TokenGrass
      - path: SharedUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.yulebuilds.tokengrass
        PRODUCT_NAME: TokenGrass
        INFOPLIST_FILE: TokenGrass/Info.plist
        CODE_SIGN_ENTITLEMENTS: TokenGrass/TokenGrass.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: TokenGrassCore
      - target: TokenGrassWidget

  TokenGrassWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: TokenGrassWidget
      - path: SharedUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.yulebuilds.tokengrass.widget
        PRODUCT_NAME: TokenGrassWidget
        INFOPLIST_FILE: TokenGrassWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: TokenGrassWidget/TokenGrassWidget.entitlements
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: TokenGrassCore
