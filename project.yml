name: TokenGrass
options:
  bundleIdPrefix: dev.yulebuilds
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

# DEVELOPMENT_TEAM comes from Signing.xcconfig, which optionally includes a
# gitignored Local.xcconfig — so the team stays out of the public repo. Copy
# Signing.local.xcconfig.example → Local.xcconfig and set your team (or just
# pick it in Xcode's Signing & Capabilities).
configFiles:
  Debug: Signing.xcconfig
  Release: Signing.xcconfig

settings:
  base:
    MARKETING_VERSION: "1.0.0" # iOS app + widget (still at the version submitted for App Store review)
    CURRENT_PROJECT_VERSION: "21"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

packages:
  TokenGrassCore:
    path: TokenGrassCore
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

targets:
  TokenGrass:
    type: application
    platform: iOS
    sources:
      - path: TokenGrass
      - path: SharedUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.yulebuilds.tokengrass
        PRODUCT_NAME: TokenGrass
        INFOPLIST_FILE: TokenGrass/Info.plist
        CODE_SIGN_ENTITLEMENTS: TokenGrass/TokenGrass.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1" # iPhone only (avoids iPad multitasking orientation requirement)
    dependencies:
      - package: TokenGrassCore
      - target: TokenGrassWidget

  TokenGrassWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: TokenGrassWidget
      - path: SharedUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.yulebuilds.tokengrass.widget
        PRODUCT_NAME: TokenGrassWidget
        INFOPLIST_FILE: TokenGrassWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: TokenGrassWidget/TokenGrassWidget.entitlements
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1" # iPhone only (match the host app)
    dependencies:
      - package: TokenGrassCore

  # macOS menu-bar companion (direct download, non-sandboxed): reads the Claude
  # Code keychain token, polls usage, accumulates, renders grass.
  TokenGrassMac:
    type: application
    platform: macOS
    sources:
      - path: TokenGrassMac
      - path: SharedUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.yulebuilds.tokengrass.mac
        PRODUCT_NAME: TokenGrass
        INFOPLIST_FILE: TokenGrassMac/Info.plist
        CODE_SIGN_ENTITLEMENTS: TokenGrassMac/TokenGrassMac.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES # required for Developer ID notarization
        # Mac companion versions independently of the iOS app/widget (its own
        # GitHub Release, own changelog). 1.2.0 adds Sparkle auto-updates.
        MARKETING_VERSION: "1.4.0"
    dependencies:
      - package: TokenGrassCore
      - package: Sparkle
